[toolchain]
anchor_version = "0.31.1"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
corner_case = "J5ip9R8afPE8wB6EPXFBaXBpr78EtQfQeG3nNr681bBN"

[programs.devnet]
corner_case = "J5ip9R8afPE8wB6EPXFBaXBpr78EtQfQeG3nNr681bBN"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# Tests run against the `localtest` feature build: the pinned settlement mint is
# swapped for the committed throwaway test mint (tests/fixtures/test-mint.json)
# and VOID_DELAY_SECS shrinks to 5s so the void path is testable in seconds.
# Invoke as: anchor test -- --features localtest
[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# The settlement tests are deterministic AND real: the local validator clones
# TxLINE's txoracle program and the daily_scores_roots account for epoch day
# 20649 (2026-07-15, England v Argentina) straight from devnet, and the suite
# replays committed real Merkle proofs (fixtures/) against them. No mocks.
[test.validator]
url = "https://api.devnet.solana.com"
# Agave 3.x refuses 0.0.0.0 as an external/gossip address (anchor's default
# once a [test.validator] section exists) — pin loopback explicitly.
bind_address = "127.0.0.1"

[[test.validator.clone]]
address = "6pW64gN1s2uqjHkn1unFeEjAwJkPGHoppGvS715wyP2J" # TxLINE txoracle program

[[test.validator.clone]]
address = "HJ6nSVkUs4VG9JQ5sEUq3VbmyUSBf76ePXUCATLtRYTX" # daily_scores_roots, epoch day 20649
